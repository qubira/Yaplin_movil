name: EAS Update — preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "backend/**"

jobs:
  update:
    name: Publish OTA update to preview
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "Falta el secret EXPO_TOKEN en este repo (Settings > Secrets and variables > Actions)."
            echo "Genera uno en https://expo.dev/settings/access-tokens"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish update to the "preview" channel
        # --platform is android|ios|all (no dedicated "web" value), and "all"
        # still makes the underlying `expo export` bundle for every platform
        # declared in app.json — including web, which this project doesn't
        # ship and doesn't have react-native-web installed for. Publish the
        # two native platforms explicitly instead.
        run: |
          eas update --channel preview --environment preview --platform android --message "Auto-publish desde ${{ github.sha }}" --non-interactive
          eas update --channel preview --environment preview --platform ios --message "Auto-publish desde ${{ github.sha }}" --non-interactive
